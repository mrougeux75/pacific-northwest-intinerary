<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#173f3a">
  <meta name="description" content="Pacific Northwest road trip itinerary, August 16–25, 2026">
  <title>Pacific Northwest · 2026</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="hero">
    <div class="hero__eyebrow">August 16–25, 2026</div>
    <h1>Pacific Northwest</h1>
    <p>Olympic · Rainier · Columbia Gorge · Oregon Coast · Bend</p>
    <div class="hero__summary">
      <span><strong>10</strong> days</span>
      <span><strong>3</strong> national parks</span>
      <span><strong>1</strong> fishing day</span>
    </div>
  </header>

  <nav class="day-strip" id="dayStrip" aria-label="Choose a day"></nav>

  <main id="mainContent">
    <section id="dayView" class="view"></section>
    <section id="mapView" class="view" hidden></section>
    <section id="tripView" class="view" hidden></section>
    <section id="searchView" class="view" hidden></section>
    <section id="checklistView" class="view" hidden></section>
  </main>

  <nav class="bottom-nav" aria-label="Primary">
    <button data-view="dayView" class="active"><span>◷</span>Day</button>
    <button data-view="mapView"><span>⌖</span>Map</button>
    <button data-view="tripView"><span>✦</span>Trip</button>
    <button data-view="searchView"><span>⌕</span>Search</button>
    <button data-view="checklistView"><span>✓</span>Checklist</button>
  </nav>

  <template id="eventTemplate">
    <article class="event">
      <div class="event__rail"><span class="event__icon"></span></div>
      <div class="event__body">
        <div class="event__topline"><time></time><span class="event__tag"></span></div>
        <h3></h3>
        <p class="event__summary"></p>
        <ul class="event__details"></ul>
        <div class="event__actions"></div>
      </div>
    </article>
  </template>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
